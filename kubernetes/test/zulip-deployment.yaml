apiVersion: apps/v1
kind: Deployment
metadata:
  name: zulip-dev
  labels:
    app: zulip
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zulip
  template:
    metadata:
      labels:
        app: zulip
    spec:
      containers:
      - name: zulip
        image: us-central1-docker.pkg.dev/zulip-dev-444717/dev-zulip/dev:latest
        ports:
        - containerPort: 9991
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1"

---
apiVersion: v1
kind: Service
metadata:
  name: zulip-service
spec:
  selector:
    app: zulip
  ports:
    - protocol: TCP
      port: 80
      targetPort: 9991
  type: LoadBalancer
